<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salesforce Test Repository</title>
    <style>
        body {font-family:Arial,sans-serif;margin:0;background:#f8f9fc;color:#2c3e50}
        header {background:#3498db;color:white;padding:24px}
        .wrap {max-width:1200px;margin:0 auto;padding:24px}
        .pill {display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,0.2);color:white;font-size:12px;font-weight:bold;margin-bottom:12px}
        h1 {margin:0 0 8px 0;}
        p {margin:0;opacity:0.9;}
        .menu {display:flex;gap:16px;background:#fff;padding:16px 24px;border-bottom:1px solid #ecf0f1;flex-wrap:wrap;}
        .menu a {color:#2c3e50;text-decoration:none;font-weight:bold;font-size:14px;padding:8px 12px;border-radius:6px;transition:all 0.2s;}
        .menu a:hover {background:#ebf3fd;color:#3498db;}
        .menu a.active {background:#3498db;color:white;}
        .clouds-grid {display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:24px;margin-top:24px;}
        .cloud-card {background:white;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(52,152,219,.15);display:flex;flex-direction:column;gap:12px;transition:transform 0.2s;}
        .cloud-card:hover {transform:translateY(-4px);}
        .cloud-card h3 {margin:0;color:#3498db;font-size:20px;}
        .cloud-card p {color:#7f8c8d;font-size:14px;}
        .btn {display:inline-block;padding:10px 16px;background:#3498db;color:white;text-decoration:none;border-radius:6px;font-weight:bold;text-align:center;font-size:14px;margin-top:auto;}
        .btn:hover {background:#2980b9;}
        .btn-outline {background:transparent;border:1px solid #3498db;color:#3498db;}
        .btn-outline:hover {background:#ebf3fd;}
        .actions {display:flex;gap:8px;margin-top:12px;}
    </style>
</head>
<body>

<header>
    <div class="wrap" style="padding-bottom:0;">
        <div class="pill">Salesforce Ecosystem</div>
        <h1>Salesforce Test Repository</h1>
        <p>Comprehensive automated test scripts for Salesforce Clouds</p>
    </div>
</header>

<div class="menu" id="mainMenu">
    <a href="/Salesforce/index.html" class="active">Overview</a>
</div>

<main class="wrap">
    <div class="clouds-grid" id="cloudsContainer">
        <!-- Dynamic content will be loaded here -->
    </div>
</main>

<script>
    async function loadManifest() {
        try {
            const response = await fetch('/Salesforce/manifest.json');
            const data = await response.json();
            const menu = document.getElementById('mainMenu');
            const container = document.getElementById('cloudsContainer');

            data.clouds.forEach(cloud => {
                // Add to menu
                const link = document.createElement('a');
                link.href = `/Salesforce/${cloud.folder}/index.html`;
                link.textContent = cloud.name;
                menu.appendChild(link);

                // Add to cards
                const card = document.createElement('div');
                card.className = 'cloud-card';
                card.innerHTML = `
                    <h3>${cloud.name} Cloud</h3>
                    <p>Access test cases and analytics for Salesforce ${cloud.name}.</p>
                    <div class="actions">
                        <a href="/Salesforce/${cloud.folder}/index.html" class="btn">View Data</a>
                        <a href="/Salesforce/${cloud.folder}/${cloud.prefix}.html" class="btn btn-outline" target="_blank">Report</a>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading manifest:', error);
            document.getElementById('cloudsContainer').innerHTML = '<p>Error loading test repository data.</p>';
        }
    }

    loadManifest();
</script>

</body>
</html>
