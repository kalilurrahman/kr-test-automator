<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Payroll - Workday Test Automator</title>
    <style>
        body {font-family:Arial,sans-serif;margin:0;background:#f7f8fc;color:#172b4d}
        header {background:#5b4db7;color:#fff;padding:28px}
        .wrap {max-width:1200px;margin:0 auto;padding:24px}
        .top-nav {display:flex;gap:16px;background:#fff;padding:16px 24px;border-bottom:1px solid #ecf0f1;flex-wrap:wrap;}
        .top-nav a {color:#172b4d;text-decoration:none;font-weight:bold;font-size:14px;padding:8px 12px;border-radius:6px;transition:all 0.2s;}
        .top-nav a:hover {background:#efeefe;color:#5b4db7;}
        .top-nav a.active {background:#5b4db7;color:white;}
        h1 {margin:0 0 8px 0;}
        .pill {display:inline-block;background:#efeefe;color:#5b4db7;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:bold;margin-bottom:12px;}
        .content {background:white;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-top:24px;text-align:center;}
        .muted {color:#5e6c84;font-size:16px;}
    </style>
</head>
<body>
    <header>
        <div class="wrap" style="padding-bottom:0;">
            <div class="pill">Workday Ecosystem</div>
            <h1 id="moduleTitle">Payroll Test Data</h1>
            <p>Access the dataset for Payroll testing scenarios.</p>
        </div>
    </header>

    <div class="top-nav" id="topNav">
        <!-- Dynamic menu populated from manifest.json -->
    </div>

    <main class="wrap">
        <div class="content">
            <p class="muted">No data files exist in this module yet. Data generation is pending.</p>
        </div>
    </main>

    <script>
        async function loadManifest() {
            try {
                const response = await fetch('/workday/manifest.json');
                const data = await response.json();

                const topNav = document.getElementById('topNav');

                data.routes.forEach(route => {
                    const navLink = document.createElement('a');
                    navLink.href = route.path;
                    navLink.textContent = route.title;
                    if (route.key === 'payroll') {
                        navLink.className = 'active';
                        document.getElementById('moduleTitle').textContent = route.title + ' Test Data';
                    }
                    topNav.appendChild(navLink);
                });

            } catch (error) {
                console.error('Error loading manifest:', error);
            }
        }

        loadManifest();
    </script>
</body>
</html>
