<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salesforce Sales Test Cases</title>
    <style>
        body {font-family:Arial,sans-serif;margin:0;background:#f8f9fc;color:#2c3e50}
        header {background:#3498db;color:white;padding:24px}
        .wrap {max-width:1200px;margin:0 auto;padding:24px}
        .pill {display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,0.2);color:white;font-size:12px;font-weight:bold;margin-bottom:12px}
        h1 {margin:0 0 8px 0;}
        p {margin:0;opacity:0.9;}
        .menu {display:flex;gap:16px;background:#fff;padding:16px 24px;border-bottom:1px solid #ecf0f1;flex-wrap:wrap;}
        .menu a {color:#2c3e50;text-decoration:none;font-weight:bold;font-size:14px;padding:8px 12px;border-radius:6px;transition:all 0.2s;}
        .menu a:hover {background:#ebf3fd;color:#3498db;}
        .menu a.active {background:#3498db;color:white;}

        table {width:100%;border-collapse:collapse;box-shadow:0 2px 8px rgba(52,152,219,.15);background:white;border-radius:12px;overflow:hidden;margin-top:24px;}
        th,td {padding:12px;border-bottom:1px solid #ecf0f1;text-align:left;font-size:13px}
        th {background:#ebf3fd;font-weight:bold;color:#2c3e50;position:sticky;top:0;}
        tr:hover {background:#f8f9fc;}

        .loading {padding:48px;text-align:center;color:#7f8c8d;font-style:italic;}

        .downloads {display:flex;gap:12px;margin-top:24px;background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(52,152,219,.15);}
        .downloads a {color:#3498db;text-decoration:none;font-weight:bold;font-size:14px;display:flex;align-items:center;gap:6px;}
        .downloads a:hover {text-decoration:underline;}
    </style>
</head>
<body>

<header>
    <div class="wrap" style="padding-bottom:0;">
        <div class="pill">Salesforce Test Repository</div>
        <h1>Sales Cloud</h1>
        <p>Dynamic Data View</p>
    </div>
</header>

<div class="menu" id="mainMenu">
    <a href="/Salesforce/index.html">Overview</a>
</div>

<main class="wrap">
    <div class="downloads">
        <strong>Downloads:</strong>
        <a href="sales_cloud_5000.csv">CSV</a>
        <a href="sales_cloud_5000.xlsx">XLSX</a>
        <a href="sales_cloud_5000.ts">TypeScript</a>
        <a href="sales_cloud_5000.html" target="_blank">Full HTML Report</a>
    </div>

    <div style="overflow-x:auto; max-height: 800px;">
        <table id="dataTable">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td class="loading" colspan="100%">Loading data from sales_cloud_5000.csv...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    // Build Menu
    async function loadManifest() {
        try {
            const response = await fetch('/Salesforce/manifest.json');
            const data = await response.json();
            const menu = document.getElementById('mainMenu');

            data.clouds.forEach(cloud => {
                const link = document.createElement('a');
                link.href = '/Salesforce/' + cloud.folder + '/index.html';
                link.textContent = cloud.name;
                if (cloud.id === 'sales') {
                    link.className = 'active';
                }
                menu.appendChild(link);
            });
        } catch (e) {
            console.error('Failed to load menu', e);
        }
    }
    loadManifest();

    // Simple CSV Parser (handles basic quoted strings and commas)
    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentCell = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i+1];

            if (char === '"' && inQuotes && nextChar === '"') {
                currentCell += '"';
                i++; // skip next quote
            } else if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                currentRow.push(currentCell.trim());
                currentCell = '';
            } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
                currentRow = [];
                currentCell = '';
                if (char === '\r') i++;
            } else {
                currentCell += char;
            }
        }

        if (currentCell || currentRow.length > 0) {
            currentRow.push(currentCell.trim());
            rows.push(currentRow);
        }

        return rows;
    }

    async function loadData() {
        try {
            const response = await fetch('sales_cloud_5000.csv');
            const text = await response.text();

            const rows = parseCSV(text).filter(r => r.length > 1);
            if (rows.length === 0) throw new Error("Empty CSV");

            const headers = rows[0];
            const dataRows = rows.slice(1, 100); // Limit to 100 for static preview performance

            const thead = document.getElementById('tableHeader');
            thead.innerHTML = headers.map(h => '<th>' + (h || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</th>').join('');

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = dataRows.map(row => {
                return '<tr>' + headers.map((_, i) => {
                    const cell = row[i] || '';
                    return '<td>' + cell.replace(/</g, '&lt;').replace(/>/g, '&gt;').substring(0, 150) + (cell.length > 150 ? '...' : '') + '</td>';
                }).join('') + '</tr>';
            }).join('');

            if (rows.length > 101) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="' + headers.length + '" style="text-align:center;padding:16px;color:#7f8c8d;">Showing 100 of ' + (rows.length - 1) + ' rows. <a href="sales_cloud_5000.csv">Download full CSV</a></td>';
                tbody.appendChild(tr);
            }

        } catch (e) {
            console.error('Failed to load CSV', e);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="100%" class="loading">Error loading test data. Check console.</td></tr>';
        }
    }

    loadData();
</script>

</body>
</html>
